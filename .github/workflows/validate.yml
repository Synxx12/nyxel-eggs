name: Validate Eggs

on:
  push:
    branches: [main]
    paths:
      - 'eggs/**/egg.json'
      - 'eggs/**/entrypoint.sh'
  pull_request:
    branches: [main]

jobs:
  validate-json:
    name: Validate egg.json files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate all egg.json files are valid JSON
        run: |
          echo "🔍 Validating egg.json files..."
          FAILED=0
          for f in eggs/**/egg.json; do
            if python3 -c "import json,sys; json.load(open('$f'))" 2>/dev/null; then
              echo "  ✓ $f"
            else
              echo "  ✗ $f — INVALID JSON"
              FAILED=1
            fi
          done
          [ $FAILED -eq 0 ] || exit 1
          echo "✅ All egg.json files are valid."

      - name: Check required PTDL_v2 fields
        run: |
          echo "🔍 Checking PTDL_v2 structure..."
          FAILED=0
          for f in eggs/**/egg.json; do
            python3 - <<PYEOF
          import json, sys
          data = json.load(open("$f"))
          required = ["meta", "name", "author", "description", "docker_images", "startup", "config", "variables"]
          missing = [k for k in required if k not in data]
          if missing:
              print(f"  ✗ $f — missing fields: {missing}")
              sys.exit(1)
          if data.get("meta", {}).get("version") != "PTDL_v2":
              print(f"  ✗ $f — meta.version must be PTDL_v2")
              sys.exit(1)
          print(f"  ✓ $f — structure OK ({len(data.get('variables', []))} variables)")
          PYEOF
            [ $? -eq 0 ] || FAILED=1
          done
          [ $FAILED -eq 0 ] || exit 1
          echo "✅ All eggs pass structure check."

      - name: Check entrypoint.sh files have execute-compatible shebang
        run: |
          echo "🔍 Checking entrypoint.sh files..."
          for f in eggs/**/entrypoint.sh; do
            head -1 "$f" | grep -q "^#!/bin/bash" && echo "  ✓ $f" || { echo "  ✗ $f — missing #!/bin/bash shebang"; exit 1; }
          done
          echo "✅ All entrypoint.sh files OK."

      - name: Verify startup URLs match egg location
        run: |
          echo "🔍 Checking startup script URLs..."
          for f in eggs/**/egg.json; do
            DIR=$(dirname "$f" | sed 's|eggs/||')
            URL_CHECK=$(python3 -c "
          import json
          data = json.load(open('$f'))
          startup = data.get('startup','')
          egg_name = '$DIR'
          if 'nyxel-eggs' in startup and 'entrypoint.sh' in startup:
              if f'eggs/{egg_name}/entrypoint.sh' in startup:
                  print('OK')
              else:
                  print(f'WARN: URL may not match egg directory ({egg_name})')
          else:
              print('SKIP')
          " 2>/dev/null)
            echo "  $f → $URL_CHECK"
          done
          echo "✅ URL check complete."

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: validate-json
    steps:
      - uses: actions/checkout@v4
      - name: Print egg inventory
        run: |
          echo "## nyxel-eggs inventory"
          echo ""
          for f in eggs/**/egg.json; do
            NAME=$(python3 -c "import json; print(json.load(open('$f'))['name'])")
            VARS=$(python3 -c "import json; print(len(json.load(open('$f')).get('variables',[])))")
            echo "  - 🥚 $NAME ($VARS variables) — $f"
          done
